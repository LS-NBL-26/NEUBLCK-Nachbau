paths:
  uploads: public/uploads
  static: public
collections_config:
  pages:
  path:
    icon: notes
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  name:
    icon: notes
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  icon:
    icon: notes
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  url:
    icon: notes
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  _enabled_editors:
    - visual
    - data
  add_options:
    - name: Neue Seite
  create:
    path: '[relative_base_path]/{title|slugify}.md'
    icon: notes
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  content_pages:
    path: src/content/pages
    name: Pages
    icon: stylus_fountain_pen
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
collection_groups:
  - heading: Inhalte
    collections:
      - pages
  - heading: New Collections
    collections:
      - content
      - content_pages
      - pages_1
  - heading: New Collections
    collections: []
_inputs:
  text:
    type: html
    options:
      allow_resize: true
      allow_custom_markup: false
      remove_custom_markup: false
      initial_height: 320
      bold: true
      format: p
      image_size_attributes: true
      italic: true
      underline: true
    label: Fließtext
    comment: Wörter markieren und Unterstreichen (⌘U) für den türkisen Marker.
    cascade: true
  buttons:
    type: array
    label: Buttons
    cascade: true
  label:
    type: text
    label: Button-Beschriftung
    cascade: true
  href:
    type: text
    label: Button-Link
    cascade: true
  style:
    type: select
    options:
      allow_empty: true
      values:
        - primary
        - secondary
    label: Button-Stil
    cascade: true
_editables:
  block:
    allow_custom_markup: false
    remove_custom_markup: false
    bold: true
    format: p
    image_size_attributes: true
    italic: true
    underline: true
timezone: Europe/Berlin
markdown:
  engine: commonmark
  options:
    xhtml: false
    breaks: false
    linkify: false
    typographer: false
    spaced_lists: false
    sentence_per_line: false
    gfm: true
    code_block_fences: '```'
    escape_snippets_in_code_blocks: false
    treat_indentation_as_code: false
    table: false
    strikethrough: false
    subscript: false
    superscript: false
    heading_ids: false
    attributes: false
