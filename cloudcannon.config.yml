paths:
  uploads: public/uploads
  static: public

collections_config:
  pages:
    path: src/content/pages
    name: Seiten
    icon: description
    url: /
    _enabled_editors:
      - visual
      - data
    add_options:
      - name: Neue Seite
    create:
      path: '[relative_base_path]/{title|slugify}.md'

collection_groups:
  - heading: Inhalte
    collections:
      - pages

_structures:
  page_sections:
    id_key: type
    values:
      - label: Introtext
        icon: notes
        value:
          type: introtext
          text: "<p>Neuer Introtext.</p>"
          buttons: []

_inputs:
  sections:
    type: array
    label: Abschnitte
    options:
      structures: _structures.page_sections
  text:
    type: html
    label: Fließtext
    comment: Wörter markieren und Unterstreichen (⌘U) für den türkisen Marker.
    options:
      bold: true
      italic: true
      underline: true
      format: p
  buttons:
    type: array
    label: Buttons
  label:
    type: text
    label: Button-Beschriftung
  href:
    type: text
    label: Button-Link
  style:
    type: select
    label: Button-Stil
    options:
      values:
        - primary
        - secondary

_editables:
  block:
    bold: true
    italic: true
    underline: true
    format: p

timezone: Europe/Berlin

markdown:
  engine: commonmark
  options:
    gfm: true