paths:
  uploads: public/uploads
  static: public

collections_config:
  pages:
    path: src/content/pages
    name: Seiten
    icon: description
    url: /[slug]/
    add_options:
      - name: Neue Seite
    create:
      path: '[relative_base_path]/{title|slugify}.md'

collection_groups:
  - heading: Inhalte
    collections:
      - pages

_inputs:
  # --- Felder deiner Hero-Section ---
  text:
    type: textarea
    label: Fließtext
    comment: Der Absatz der Section.
  highlight:
    type: text
    label: Markierter Ausschnitt
    comment: Muss WORTGENAU so im Fließtext vorkommen – wird türkis markiert.
  buttons:
    type: array
    label: Buttons
  label:
    type: text
    label: Button-Beschriftung
  href:
    type: text
    label: Button-Link
    comment: Zieladresse, z. B. /leistungen/
  style:
    type: select
    label: Button-Stil
    options:
      values:
        - primary
        - secondary
    comment: primary = pink gefüllt, secondary = weiß mit Umriss.

timezone: Europe/Berlin

markdown:
  engine: commonmark
  options:
    gfm: true