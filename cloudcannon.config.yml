paths:
  uploads: public/uploads
  static: public

collections_config:
  pages:
    path: src/content/pages
    name: Seiten
    icon: description
    url: /
    _enabled_editors:
      - visual
      - data
    add_options:
      - name: Neue Seite
    create:
      path: '[relative_base_path]/{title|slugify}.md'
  data:
    path: src/data
    name: Globale Daten
    icon: settings
    disable_add: true
    disable_add_folder: true
    disable_url: true
    _enabled_editors:
      - data

collection_groups:
  - heading: Inhalte
    collections:
      - pages
  - heading: Global
    collections:
      - data

_structures:
  page_sections:
    id_key: type
    values:
      - label: Introtext
        icon: notes
        value:
          type: introtext
          text: "<p>Neuer Introtext.</p>"
          buttons: []
  buttons:
    values:
      - label: Button
        icon: smart_button
        value:
          label: Neuer Button
          href: /
          style: primary
  nav_item:
    values:
      - label: Menüpunkt
        icon: link
        value:
          label: Neuer Menüpunkt
          href: /
          children: []
  nav_leaf:
    values:
      - label: Unterpunkt
        icon: link
        value:
          label: Neuer Unterpunkt
          href: /
  contact_item:
    values:
      - label: Kontakt-Eintrag
        icon: contact_phone
        value:
          label: "+49 000 000 00 00"
          href: "tel:+49000000000"
          icon: fa-solid fa-phone
  social_item:
    values:
      - label: Social-Media-Eintrag
        icon: share
        value:
          label: LinkedIn
          href: "https://"
          icon: fa-brands fa-linkedin

_inputs:
  sections:
    type: array
    label: Abschnitte
    options:
      structures: _structures.page_sections
  menu_items:
    type: array
    label: Menüpunkte
    options:
      structures: _structures.nav_item
  children:
    type: array
    label: Unterpunkte
    options:
      structures: _structures.nav_leaf
  contact:
    type: array
    label: Kontakt
    options:
      structures: _structures.contact_item
  social:
    type: array
    label: Social Media
    options:
      structures: _structures.social_item
  icon:
    type: text
    label: Icon-Klasse
    comment: Font-Awesome-Klasse, z. B. "fa-solid fa-phone"
  text:
    type: html
    label: Fließtext
    comment: Wörter markieren und Unterstreichen (⌘U) für den türkisen Marker.
    options:
      bold: true
      italic: true
      underline: true
      format: p
  buttons:
    type: array
    label: Buttons
    options:
      structures: _structures.buttons
  label:
    type: text
    label: Beschriftung
  href:
    type: text
    label: Link
  style:
    type: select
    label: Stil
    options:
      values:
        - primary
        - secondary
  links:
    type: array
    label: Footer-Links
    options:
      structures: _structures.nav_item
  copyright:
    type: text
    label: Copyright-Text

_editables:
  block:
    bold: true
    italic: true
    underline: true
    format: p

timezone: Europe/Berlin

markdown:
  engine: commonmark
  options:
    gfm: true